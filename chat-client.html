<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Besdong Chat</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    #header { background: #16213e; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #header h1 { font-size: 1rem; color: #4fc3f7; flex: 1; }
    #header input { background: #0f3460; border: 1px solid #1565c0; border-radius: 6px; padding: 6px 10px; color: #e0e0e0; font-size: 0.82rem; width: 160px; }
    #status-badge { font-size: 0.78rem; padding: 4px 10px; border-radius: 12px; background: #263238; white-space: nowrap; }
    #status-badge.online { background: #1b5e20; color: #81c784; }
    .btn { padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: opacity 0.15s; white-space: nowrap; }
    .btn:hover { opacity: 0.85; }
    .btn-blue   { background: #1565c0; color: #fff; }
    .btn-green  { background: #2e7d32; color: #fff; }
    .btn-red    { background: #b71c1c; color: #fff; }
    .btn-gray   { background: #37474f; color: #fff; }
    .btn-full   { width: 100%; }

    /* Layout */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 220px; background: #16213e; border-right: 1px solid #0f3460; padding: 14px 12px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
    #sidebar .label { font-size: 0.7rem; color: #78909c; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
    #sidebar input { width: 100%; background: #0f3460; border: 1px solid #1565c0; border-radius: 6px; padding: 7px 10px; color: #e0e0e0; font-size: 0.82rem; }
    #my-id { font-size: 0.7rem; color: #546e7a; word-break: break-all; line-height: 1.4; }
    #push-status { font-size: 0.68rem; color: #546e7a; word-break: break-all; line-height: 1.4; }
    .divider { border: none; border-top: 1px solid #0f3460; }

    /* Chat */
    #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

    /* Messages */
    .msg { max-width: 72%; display: flex; flex-direction: column; gap: 2px; }
    .msg.mine   { align-self: flex-end; align-items: flex-end; }
    .msg.theirs { align-self: flex-start; align-items: flex-start; }

    .msg-sender { font-size: 0.7rem; color: #78909c; padding: 0 4px; }
    .msg-bubble { padding: 9px 13px; border-radius: 16px; max-width: 100%; word-break: break-word; }
    .msg.mine   .msg-bubble { background: #1565c0; color: #fff; border-bottom-right-radius: 4px; }
    .msg.theirs .msg-bubble { background: #263238; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .msg-time { font-size: 0.66rem; color: #546e7a; padding: 0 4px; }

    .msg-image { max-width: 280px; max-height: 220px; border-radius: 10px; display: block; cursor: zoom-in; }
    .msg-caption { font-size: 0.88rem; margin-top: 5px; }

    .msg-file { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .msg-file-icon { font-size: 1.8rem; line-height: 1; }
    .msg-file-name { font-size: 0.88rem; font-weight: 600; }
    .msg-file-size { font-size: 0.72rem; opacity: 0.65; }

    .msg-audio audio { width: 210px; height: 36px; }

    .msg-reply-preview { background: rgba(0,0,0,0.18); border-left: 3px solid #4fc3f7; border-radius: 0 6px 6px 0; padding: 5px 9px; margin-bottom: 6px; cursor: pointer; max-width: 100%; overflow: hidden; }
    .msg-reply-preview .reply-sender { font-size: 0.75rem; font-weight: 700; color: #4fc3f7; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .msg-reply-preview .reply-content { font-size: 0.78rem; color: #b0bec5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .msg-forwarded-label { font-size: 0.72rem; color: #78909c; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }

    /* Forward modal */
    #forward-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; justify-content: center; align-items: center; }
    #forward-modal.open { display: flex; }
    #forward-box { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 20px; width: 320px; display: flex; flex-direction: column; gap: 12px; }
    #forward-box h3 { font-size: 0.95rem; color: #4fc3f7; margin: 0; }
    #forward-box input { background: #0f3460; border: 1px solid #1565c0; border-radius: 6px; padding: 8px 12px; color: #e0e0e0; font-size: 0.85rem; width: 100%; }
    #forward-box .btn-row { display: flex; gap: 8px; justify-content: flex-end; }

    /* Reactions */
    .msg-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .reaction-pill { display: inline-flex; align-items: center; gap: 3px; background: #263238; border: 1px solid #37474f; border-radius: 12px; padding: 2px 8px; font-size: 0.8rem; cursor: pointer; transition: background 0.15s, border-color 0.15s; user-select: none; }
    .reaction-pill:hover { background: #37474f; }
    .reaction-pill.me { background: #1565c0; border-color: #4fc3f7; }
    .reaction-pill .r-count { font-size: 0.75rem; color: #b0bec5; }
    .reaction-pill.me .r-count { color: #e3f2fd; }

    .emoji-picker { display: none; position: absolute; background: #16213e; border: 1px solid #0f3460; border-radius: 20px; padding: 4px 8px; gap: 4px; z-index: 10; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
    .emoji-picker.show { display: flex; }
    .emoji-btn { font-size: 1.2rem; cursor: pointer; padding: 3px 4px; border-radius: 6px; line-height: 1; border: none; background: none; transition: transform 0.1s; }
    .emoji-btn:hover { transform: scale(1.3); background: rgba(255,255,255,0.08); }

    .msg-action-bar { display: none; gap: 4px; position: relative; }
    .msg:hover .msg-action-bar { display: flex; }
    .msg.mine .msg-action-bar { justify-content: flex-end; }
    .action-btn { font-size: 0.72rem; background: #263238; border: none; border-radius: 10px; padding: 3px 8px; color: #90a4ae; cursor: pointer; }
    .action-btn:hover { background: #37474f; color: #e0e0e0; }

    #reply-bar { display: none; background: #0f3460; border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; color: #90caf9; align-items: center; gap: 8px; }
    #reply-bar.show { display: flex; }
    #reply-bar span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #reply-cancel { cursor: pointer; color: #ef9a9a; font-size: 1rem; line-height: 1; background: none; border: none; }

    .sys-msg { text-align: center; font-size: 0.72rem; color: #546e7a; padding: 2px 0; }

    /* Input area */
    #input-area { background: #16213e; border-top: 1px solid #0f3460; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }

    .input-row { display: flex; align-items: center; gap: 8px; }
    .input-label { font-size: 0.78rem; color: #78909c; white-space: nowrap; }
    select { background: #0f3460; border: 1px solid #1565c0; border-radius: 6px; padding: 5px 8px; color: #e0e0e0; font-size: 0.82rem; cursor: pointer; }

    #file-row { display: none; }
    #file-row.show { display: flex; }
    #file-real { display: none; }
    #file-pick { background: #37474f; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; }
    #file-pick:hover { background: #455a64; }
    #file-name { font-size: 0.78rem; color: #90a4ae; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #upload-status { font-size: 0.76rem; color: #4fc3f7; }

    #mode-row { display: none; }
    #mode-row.show { display: flex; }

    #send-row { display: flex; gap: 8px; }
    #messageInput { flex: 1; background: #0f3460; border: 1px solid #1565c0; border-radius: 20px; padding: 9px 16px; color: #e0e0e0; font-size: 0.9rem; outline: none; }
    #messageInput:focus { border-color: #4fc3f7; }
    #messageInput::placeholder { color: #455a64; }
    #sendBtn { background: #1565c0; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.1rem; color: #fff; flex-shrink: 0; }
    #sendBtn:hover { background: #1976d2; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 999; justify-content: center; align-items: center; cursor: zoom-out; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92%; max-height: 92%; border-radius: 8px; box-shadow: 0 8px 40px #000; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #37474f; border-radius: 4px; }
  </style>
</head>
<body>

<div id="header">
  <h1>Besdong Chat</h1>
  <input id="email" type="email" placeholder="Email" value="sokheng@example.com" />
  <input id="password" type="password" placeholder="Password" value="Test@1234" />
  <button class="btn btn-blue" id="loginBtn">Login</button>
  <button class="btn btn-red"  id="logoutBtn">Logout</button>
  <div id="status-badge">Not logged in</div>
</div>

<div id="main">
  <div id="sidebar">
    <div>
      <div class="label">Conversation ID</div>
      <input id="conversationId" type="text" placeholder="Paste conversation ID" />
    </div>
    <button class="btn btn-gray btn-full" id="loadMessagesBtn">Load History</button>
    <button class="btn btn-green btn-full" id="joinBtn">Join Room</button>
    <button class="btn btn-red btn-full" id="leaveBtn">Leave Room</button>
    <hr class="divider" />
    <div class="label">My User ID</div>
    <div id="my-id">—</div>
    <hr class="divider" />
    <div class="label">Push Notifications</div>
    <button class="btn btn-gray btn-full" id="pushBtn">Enable Push</button>
    <div id="push-status">—</div>
  </div>

  <div id="chat-area">
    <div id="messages">
      <div class="sys-msg">Login and join a conversation to start chatting</div>
    </div>

    <div id="input-area">

      <div class="input-row" id="type-row">
        <span class="input-label">Type:</span>
        <select id="type-select">
          <option value="text">💬 Text</option>
          <option value="image">🖼 Image</option>
          <option value="file">📄 File / Video</option>
          <option value="audio">🎵 Audio</option>
        </select>
      </div>

      <div class="input-row" id="mode-row">
        <span class="input-label">Mode:</span>
        <select id="mode-select">
          <option value="compressed">Compressed — resized JPEG</option>
          <option value="original">Original — keep format</option>
        </select>
      </div>

      <div class="input-row" id="file-row">
        <label id="file-pick" for="file-real">📎 Choose</label>
        <input id="file-real" type="file" />
        <span id="file-name">No file chosen</span>
        <span id="upload-status"></span>
      </div>

      <div id="reply-bar">
        <span id="reply-preview-text"></span>
        <button id="reply-cancel" title="Cancel reply">✕</button>
      </div>

      <div class="input-row" id="send-row">
        <input id="messageInput" type="text" placeholder="Message or caption…" />
        <button id="sendBtn">➤</button>
      </div>

    </div>
  </div>
</div>

<div id="forward-modal">
  <div id="forward-box">
    <h3>↪ Forward Message</h3>
    <input id="forward-target" type="text" placeholder="Paste target conversation ID" />
    <div class="btn-row">
      <button class="btn btn-gray" id="forward-cancel-btn">Cancel</button>
      <button class="btn btn-blue" id="forward-confirm-btn">Forward</button>
    </div>
  </div>
</div>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="" />
</div>

<script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
<script>
  const API = 'http://localhost:3000/api/v1';
  const WS  = 'http://localhost:3000/ws';

  let token = null;
  let socket = null;
  let myUserId = null;
  let pendingAttachment = null;
  let typingTimer = null;
  let replyToId = null;
  let isTyping = false;

  const $ = id => document.getElementById(id);
  const fmtSize = b => b < 1024*1024 ? (b/1024).toFixed(1)+' KB' : (b/1024/1024).toFixed(1)+' MB';
  const fmtTime = iso => new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  function setStatus(text, online = false) {
    const el = $('status-badge');
    el.textContent = text;
    el.className = online ? 'online' : '';
  }

  function sysMsg(text) {
    const d = document.createElement('div');
    d.className = 'sys-msg';
    d.textContent = text;
    $('messages').appendChild(d);
    scrollBottom();
  }

  function scrollBottom() {
    const m = $('messages');
    m.scrollTop = m.scrollHeight;
  }

  function fileIcon(mime) {
    if (!mime) return '📄';
    if (mime.startsWith('video/')) return '🎬';
    if (mime.includes('pdf')) return '📕';
    if (mime.includes('word') || mime.includes('doc')) return '📘';
    if (mime.includes('excel') || mime.includes('sheet') || mime.includes('xls')) return '📗';
    if (mime.includes('powerpoint') || mime.includes('presentation') || mime.includes('ppt')) return '📙';
    if (mime.includes('zip')) return '🗜';
    if (mime.startsWith('text/')) return '📝';
    return '📄';
  }

  function setReply(id, previewText) {
    replyToId = id;
    $('reply-preview-text').textContent = '↩ ' + previewText;
    $('reply-bar').classList.add('show');
    $('messageInput').focus();
  }

  function clearReply() {
    replyToId = null;
    $('reply-bar').classList.remove('show');
    $('reply-preview-text').textContent = '';
  }

  const QUICK_EMOJIS = ['👍','❤️','😂','😮','😢','🙏'];

  function renderReactions(reactions, msgId, convId) {
    const row = document.createElement('div');
    row.className = 'msg-reactions';
    row.dataset.reactionsFor = msgId;
    (reactions || []).forEach(r => {
      const pill = document.createElement('button');
      pill.className = 'reaction-pill' + (r.reacted_by_me ? ' me' : '');
      pill.innerHTML = `${r.emoji} <span class="r-count">${r.count}</span>`;
      pill.title = r.reacted_by_me ? 'Remove reaction' : 'Add reaction';
      pill.addEventListener('click', (e) => { e.stopPropagation(); toggleReaction(convId, msgId, r.emoji, r.reacted_by_me); });
      row.appendChild(pill);
    });
    return row;
  }

  function updateReactionsUI(msgId, reactions) {
    const convId = $('conversationId').value.trim();
    const existing = document.querySelector(`[data-reactions-for="${msgId}"]`);
    if (existing) existing.replaceWith(renderReactions(reactions, msgId, convId));
  }

  async function toggleReaction(convId, msgId, emoji, alreadyReacted) {
    if (!token) return;
    if (socket && socket.connected) {
      // Use WebSocket — gateway broadcasts message:reaction to the room
      socket.emit(alreadyReacted ? 'reaction:remove' : 'reaction:add', {
        conversation_id: convId,
        message_id: msgId,
        emoji,
      });
    } else {
      // Fallback to REST — controller also broadcasts via gateway
      if (alreadyReacted) {
        const res = await fetch(`${API}/conversations/${convId}/messages/${msgId}/reactions/${encodeURIComponent(emoji)}`, {
          method: 'DELETE', headers: { Authorization: 'Bearer ' + token },
        });
        const data = await res.json();
        if (data.success) updateReactionsUI(msgId, data.data);
      } else {
        const res = await fetch(`${API}/conversations/${convId}/messages/${msgId}/reactions`, {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ emoji }),
        });
        const data = await res.json();
        if (data.success) updateReactionsUI(msgId, data.data);
      }
    }
  }

  function showEmojiPicker(picker, convId, msgId) {
    // close any other open pickers
    document.querySelectorAll('.emoji-picker.show').forEach(p => { if (p !== picker) p.classList.remove('show'); });
    picker.classList.toggle('show');
  }

  function renderMsg(msg) {
    const isMe = msg.sender_id === myUserId;
    const convId = $('conversationId').value.trim();
    const wrap = document.createElement('div');
    wrap.className = `msg ${isMe ? 'mine' : 'theirs'}`;
    wrap.dataset.id = msg.id;

    if (!isMe) {
      const s = document.createElement('div');
      s.className = 'msg-sender';
      s.textContent = (msg.sender_id || '').slice(0, 8) + '…';
      wrap.appendChild(s);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    if (msg.forwarded_from) {
      const fwd = document.createElement('div');
      fwd.className = 'msg-forwarded-label';
      fwd.textContent = '↪ Forwarded';
      bubble.appendChild(fwd);
    }

    if (msg.reply_to) {
      const rp = document.createElement('div');
      rp.className = 'msg-reply-preview';
      const senderName = msg.reply_to.sender_id === myUserId ? 'You' : (msg.reply_to.sender_id || '').slice(0, 8) + '…';
      const previewContent = msg.reply_to.content || (msg.reply_to.type !== 'text' ? `[${msg.reply_to.type}]` : 'Deleted message');
      rp.innerHTML = `<div class="reply-sender">${senderName}</div><div class="reply-content">${previewContent}</div>`;
      rp.addEventListener('click', (e) => {
        e.stopPropagation();
        const target = document.querySelector(`[data-id="${msg.reply_to.id}"]`);
        if (target) { target.scrollIntoView({ behavior: 'smooth', block: 'center' }); target.style.transition = 'background 0.3s'; target.style.background = 'rgba(79,195,247,0.15)'; setTimeout(() => target.style.background = '', 1000); }
      });
      bubble.appendChild(rp);
    }

    if (msg.deleted_at) {
      bubble.style.opacity = '0.45';
      bubble.style.fontStyle = 'italic';
      const del = document.createElement('span');
      del.textContent = 'Message deleted';
      bubble.appendChild(del);

    } else if (msg.type === 'text') {
      const txt = document.createElement('span');
      txt.textContent = msg.content;
      bubble.appendChild(txt);

    } else if (msg.type === 'image' && msg.attachments?.length) {
      const a = msg.attachments[0];
      const img = document.createElement('img');
      img.src = a.url;
      img.className = 'msg-image';
      img.alt = a.file_name || 'image';
      img.onclick = () => { $('lightbox-img').src = a.url; $('lightbox').classList.add('open'); };
      bubble.appendChild(img);
      if (msg.content) {
        const cap = document.createElement('div');
        cap.className = 'msg-caption';
        cap.textContent = msg.content;
        bubble.appendChild(cap);
      }

    } else if (msg.type === 'audio' && msg.attachments?.length) {
      const a = msg.attachments[0];
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = a.url;
      audio.className = 'msg-audio';
      bubble.appendChild(audio);

    } else if (msg.attachments?.length) {
      const a = msg.attachments[0];
      const link = document.createElement('a');
      link.className = 'msg-file';
      link.href = a.url;
      link.target = '_blank';
      link.download = a.file_name || 'file';
      link.innerHTML = `
        <span class="msg-file-icon">${fileIcon(a.mime_type)}</span>
        <span>
          <div class="msg-file-name">${a.file_name || 'File'}</div>
          <div class="msg-file-size">${fmtSize(a.size)}</div>
        </span>`;
      bubble.appendChild(link);
      if (msg.content) {
        const cap = document.createElement('div');
        cap.className = 'msg-caption';
        cap.textContent = msg.content;
        bubble.appendChild(cap);
      }
    }

    wrap.appendChild(bubble);

    // Action bar (reply + emoji picker + forward)
    if (!msg.deleted_at) {
      const actionBar = document.createElement('div');
      actionBar.className = 'msg-action-bar';

      const replyBtn = document.createElement('button');
      replyBtn.className = 'action-btn';
      replyBtn.textContent = '↩ Reply';
      replyBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const preview = msg.content || (msg.attachments?.[0]?.file_name ?? 'Attachment');
        setReply(msg.id, preview);
      });

      const emojiToggle = document.createElement('button');
      emojiToggle.className = 'action-btn';
      emojiToggle.textContent = '😊 React';

      const picker = document.createElement('div');
      picker.className = 'emoji-picker';
      QUICK_EMOJIS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.className = 'emoji-btn';
        btn.textContent = emoji;
        btn.title = emoji;
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          picker.classList.remove('show');
          toggleReaction(convId, msg.id, emoji, false);
        });
        picker.appendChild(btn);
      });

      emojiToggle.addEventListener('click', (e) => { e.stopPropagation(); showEmojiPicker(picker, convId, msg.id); });

      const fwdBtn = document.createElement('button');
      fwdBtn.className = 'action-btn';
      fwdBtn.textContent = '↪ Forward';
      fwdBtn.addEventListener('click', (e) => { e.stopPropagation(); openForwardModal(convId, msg.id); });

      actionBar.appendChild(replyBtn);
      actionBar.appendChild(emojiToggle);
      actionBar.appendChild(picker);
      actionBar.appendChild(fwdBtn);
      wrap.appendChild(actionBar);
    }

    // Reactions row
    wrap.appendChild(renderReactions(msg.reactions, msg.id, convId));


    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = fmtTime(msg.created_at) + (msg.is_edited ? ' · edited' : '');
    wrap.appendChild(t);

    return wrap;
  }

  // ── Auth ───────────────────────────────────────────────────────────────────

  $('loginBtn').addEventListener('click', async () => {
    const email = $('email').value.trim();
    const password = $('password').value;
    if (!email || !password) return alert('Enter email and password');

    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!data.data?.access_token) return alert(data.message || 'Login failed');

    token = data.data.access_token;

    const me = await fetch(`${API}/users/me`, { headers: { Authorization: 'Bearer ' + token } });
    const meData = await me.json();
    myUserId = meData.data?.id;
    $('my-id').textContent = myUserId || '—';

    setStatus(email, true);
    sysMsg(`Logged in as ${email}`);
  });

  $('logoutBtn').addEventListener('click', () => {
    if (socket) { socket.disconnect(); socket = null; }
    token = null; myUserId = null; pendingAttachment = null;
    $('my-id').textContent = '—';
    setStatus('Not logged in');
    sysMsg('Logged out');
  });

  // ── History ────────────────────────────────────────────────────────────────

  $('loadMessagesBtn').addEventListener('click', async () => {
    if (!token) return alert('Login first');
    const convId = $('conversationId').value.trim();
    if (!convId) return alert('Enter conversation ID');

    const res = await fetch(`${API}/conversations/${convId}/messages`, {
      headers: { Authorization: 'Bearer ' + token },
    });
    const data = await res.json();
    if (!data.success) return sysMsg('Error: ' + data.message);

    $('messages').innerHTML = '';
    sysMsg('── Message history ──');
    [...data.data].reverse().forEach(m => $('messages').appendChild(renderMsg(m)));
    scrollBottom();
  });

  // ── WebSocket ──────────────────────────────────────────────────────────────

  $('joinBtn').addEventListener('click', () => {
    if (!token) return alert('Login first');
    const convId = $('conversationId').value.trim();
    if (!convId) return alert('Enter conversation ID');

    if (socket) socket.disconnect();

    socket = io(WS, { auth: { token: 'Bearer ' + token } });

    socket.on('connect', () => {
      sysMsg(`Socket connected`);
      socket.emit('conversation:join', { conversation_id: convId });
    });
    socket.on('disconnect', reason => sysMsg(`Disconnected: ${reason}`));
    socket.on('connect_error', err => sysMsg(`Connect error: ${err.message}`));
    socket.on('message:new', msg => { $('messages').appendChild(renderMsg(msg)); scrollBottom(); });
    socket.on('message:read_receipt', d => sysMsg(`Read by ${(d.user_id||'').slice(0,8)}…`));
    socket.on('typing:indicator', d => { if (d.is_typing) sysMsg(`${(d.user_id||'').slice(0,8)}… is typing`); });
    socket.on('user:status', d => sysMsg(`${(d.user_id||'').slice(0,8)}… ${d.is_online ? 'online' : 'offline'}`));
    socket.on('message:reaction', d => updateReactionsUI(d.message_id, d.reactions));
    socket.on('error', err => sysMsg(`Error: ${JSON.stringify(err)}`));
  });

  $('leaveBtn').addEventListener('click', () => {
    if (socket) { socket.disconnect(); socket = null; sysMsg('Left room'); }
  });

  // ── Type selector ──────────────────────────────────────────────────────────

  $('type-select').addEventListener('change', () => {
    const type = $('type-select').value;
    const fileRow = $('file-row');
    const modeRow = $('mode-row');
    const fileInput = $('file-real');

    pendingAttachment = null;
    $('file-name').textContent = 'No file chosen';
    $('upload-status').textContent = '';

    if (type === 'text') {
      fileRow.classList.remove('show');
      modeRow.classList.remove('show');
    } else if (type === 'image') {
      fileRow.classList.add('show');
      modeRow.classList.add('show');
      fileInput.accept = 'image/*';
    } else if (type === 'audio') {
      fileRow.classList.add('show');
      modeRow.classList.remove('show');
      fileInput.accept = 'audio/*';
    } else {
      // file / video
      fileRow.classList.add('show');
      modeRow.classList.remove('show');
      fileInput.accept = '.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.mp4,.mov,.avi,.mkv,.webm';
    }
  });

  // ── File picked — auto upload ──────────────────────────────────────────────

  $('file-real').addEventListener('change', async () => {
    const file = $('file-real').files[0];
    if (!file) return;
    if (!token) return alert('Login first');

    $('file-name').textContent = file.name;
    $('upload-status').textContent = 'Uploading…';
    pendingAttachment = null;

    const msgType = $('type-select').value;
    const mode = msgType === 'image' ? $('mode-select').value : 'original';

    const form = new FormData();
    form.append('file', file);

    try {
      const res = await fetch(`${API}/upload?type=attachment&mode=${mode}`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token },
        body: form,
      });
      const data = await res.json();
      if (!data.success) {
        $('upload-status').textContent = '✗ ' + data.message;
        return;
      }
      const d = data.data;
      const attType = msgType === 'file' && file.type.startsWith('video/') ? 'video'
                    : msgType === 'audio' ? 'audio'
                    : msgType === 'image' ? 'image'
                    : 'file';

      pendingAttachment = {
        url: d.url,
        key: d.key,
        type: attType,
        mime_type: d.mimeType,
        size: d.size,
        ...(d.width  ? { width:  d.width  } : {}),
        ...(d.height ? { height: d.height } : {}),
        file_name: file.name,
      };
      $('upload-status').textContent = `✓ ${fmtSize(d.size)}`;
    } catch (e) {
      $('upload-status').textContent = '✗ ' + e.message;
    }
  });

  // ── Send ───────────────────────────────────────────────────────────────────

  $('sendBtn').addEventListener('click', sendMessage);
  $('messageInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendMessage() {
    if (!socket) return alert('Join a room first');
    const convId = $('conversationId').value.trim();
    const content = $('messageInput').value.trim();
    const type = $('type-select').value;

    if (type === 'text') {
      if (!content) return;
      socket.emit('message:send', { conversation_id: convId, type: 'text', content, ...(replyToId ? { reply_to_id: replyToId } : {}) });
    } else {
      if (!pendingAttachment) return alert('Upload a file first');
      socket.emit('message:send', {
        conversation_id: convId,
        type,
        content: content || undefined,
        attachments: [pendingAttachment],
        ...(replyToId ? { reply_to_id: replyToId } : {}),
      });
      pendingAttachment = null;
      $('file-name').textContent = 'No file chosen';
      $('upload-status').textContent = '';
      $('file-real').value = '';
    }

    clearReply();
    $('messageInput').value = '';
    clearTimeout(typingTimer);
    isTyping = false;
  }

  $('reply-cancel').addEventListener('click', clearReply);

  // ── Typing ─────────────────────────────────────────────────────────────────

  $('messageInput').addEventListener('input', () => {
    if (!socket) return;
    const convId = $('conversationId').value.trim();
    if (!isTyping) {
      isTyping = true;
      socket.emit('typing:start', { conversation_id: convId });
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
      isTyping = false;
      socket.emit('typing:stop', { conversation_id: convId });
    }, 2000);
  });

  // ── Forward ────────────────────────────────────────────────────────────────

  let forwardCtx = { convId: null, msgId: null };

  function openForwardModal(convId, msgId) {
    forwardCtx = { convId, msgId };
    $('forward-target').value = '';
    $('forward-modal').classList.add('open');
    $('forward-target').focus();
  }

  $('forward-cancel-btn').addEventListener('click', () => $('forward-modal').classList.remove('open'));

  $('forward-confirm-btn').addEventListener('click', async () => {
    const targetId = $('forward-target').value.trim();
    if (!targetId) return alert('Enter a target conversation ID');
    if (!token) return alert('Login first');

    const res = await fetch(`${API}/conversations/${forwardCtx.convId}/messages/${forwardCtx.msgId}/forward`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ target_conversation_id: targetId }),
    });
    const data = await res.json();
    $('forward-modal').classList.remove('open');
    if (!data.success) return sysMsg('Forward failed: ' + data.message);
    sysMsg(`Message forwarded to conversation ${targetId.slice(0, 8)}…`);
    // If we're already viewing the target, append it
    if (targetId === $('conversationId').value.trim()) {
      $('messages').appendChild(renderMsg(data.data));
      scrollBottom();
    }
  });

  // ── Lightbox ───────────────────────────────────────────────────────────────

  $('lightbox').addEventListener('click', () => $('lightbox').classList.remove('open'));

  // ── Close emoji pickers on outside click ──────────────────────────────────

  document.addEventListener('click', () => {
    document.querySelectorAll('.emoji-picker.show').forEach(p => p.classList.remove('show'));
  });

  // ── Push Notifications ────────────────────────────────────────────────────

  const FIREBASE_CONFIG = {
    apiKey: 'AIzaSyAqVNsQz4EhURTGCBkVtlMulCRrqa5TX50',
    authDomain: 'besdong-messenger-app.firebaseapp.com',
    projectId: 'besdong-messenger-app',
    storageBucket: 'besdong-messenger-app.firebasestorage.app',
    messagingSenderId: '123828249605',
    appId: '1:123828249605:web:d7d2635a38f1596a61686c',
  };
  const VAPID_KEY = 'BOKqYStAnMa1V2CdoxPNuergVVPkELK43znHIL90TNJcHHpUgjw-BYcPFY3dFUc_mSp57ibcn5Lend-6CbO3CYk';

  $('pushBtn').addEventListener('click', async () => {
    if (!token) return alert('Login first');
    try {
      $('push-status').textContent = 'Requesting permission…';
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') {
        $('push-status').textContent = '✗ Permission denied';
        return;
      }

      if (!('serviceWorker' in navigator)) {
        $('push-status').textContent = '✗ Service workers not supported in this browser';
        return;
      }

      $('push-status').textContent = 'Registering service worker…';
      const swReg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');

      if (!firebase.apps.length) {
        firebase.initializeApp(FIREBASE_CONFIG);
      }
      const messaging = firebase.messaging();

      messaging.onMessage((payload) => {
        const n = payload.notification || {};
        sysMsg(`🔔 Push (foreground): ${n.title || ''} — ${n.body || ''}`);
      });

      $('push-status').textContent = 'Getting FCM token…';
      const fcmToken = await messaging.getToken({ vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });

      $('push-status').textContent = 'Registering with server…';
      const res = await fetch(`${API}/users/me/device-tokens`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: fcmToken, platform: 'web' }),
      });
      await res.json();

      $('push-status').textContent = '✓ ' + fcmToken.slice(0, 24) + '…';
      $('pushBtn').textContent = 'Push Enabled ✓';
      $('pushBtn').className = 'btn btn-green btn-full';
      sysMsg('🔔 Push notifications enabled — click "Leave Room" to go offline, then have another user send you a message');
    } catch (e) {
      $('push-status').textContent = '✗ ' + e.message;
      console.error(e);
    }
  });
</script>
</body>
</html>
